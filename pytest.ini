# PINN V2 Pytest Configuration
# 运行测试: pytest tests/ -v
# 运行覆盖率: pytest tests/ --cov=src --cov-report=html

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
